<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4 bg-white rounded border p-3">
            <form>
                <div class="mb-3">
                    <label for="inputUser" class="form-label">Nombre de usuario</label>
                    <input type="text" class="form-control border border-black" id="inputUser">
                    <span class="error" id="nombre_usuario_error"></span>
                </div>
                <div class="mb-3">
                    <label for="inputEmail" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control border border-black" id="inputEmail">
                    <span class="error" id="email_error"></span>
                </div>
                <div class="mb-5">
                    <label for="inputPassword" class="form-label">Contraseña</label>
                    <input type="password" class="form-control border border-black" id="inputPassword">
                    <span class="error" id="contrasena_error"></span>
                </div>
                    <button type="button" class="btn btn-primary col-12 mb-3" onclick="registro()" id="enviar-registro">Enviar</button>
                    <a href="login.html" class="login-link col-12">¿Ya tienes una cuenta? Inicia sesión aquí</a>

            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="js/sesions.js"></script>
</body>

</html>
