<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom border-secondary">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Historial</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="configuracion.html">Configuración</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <div class="container pt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <form>
                <div class="mb-3">
                    <label for="inputUser" class="form-label">Nombre de usuario</label>
                    <input type="text" class="form-control border border-secondary" id="inputUser" disabled>
                    <span class="error" id="nombre_usuario_error"></span>
                </div>

                <div class="mb-4">
                    <label for="inputEmail" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control border border-secondary" id="inputEmail" disabled>
                    <span class="error" id="email_error"></span>
                </div>


                <input type="button" class="col-12 mt-5 mb-5 border border-danger text-danger" id="editar" value="Editar">
                <div class="row justify-content-around" id="btns-edicion">

                        <input type="button" class="col-4 mt-5 mb-5 border" id="cancelar" value="Cancelar">
                        <input type="button" class="col-4 mt-5 mb-5 border " id="guardar" value="Guardar">

                </div>


                <input type="button" value="Eliminar" class="col-12 mb-4 border border-danger text-danger" onclick="borrar()">
                <input type="button" value="Cerrar Sesion" class="col-12 border border-danger text-danger" id="cerrar-sesion">
            </form>
        </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/configuracion.js"></script>

</html>
