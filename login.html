<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>

    <div class="container login-container">
        <form action="" method="post" class="login-form">
            <label for="inputUser" class="form-label">Nombre de usuario</label>
            <input type="text" class="form" id="inputUser">
            <span class="error" id="nombre_usuario_error"></span>

            <label for="inputPassword" class="form-label">Contraseña</label>
            <input type="password" class="form" id="inputPassword">
            <span class="error" id="contrasena_error"></span>

            <button type="button" onclick="login()" class="btn">Enviar</button>
            <a href="registro.html" class="register-link">¿No tienes una cuenta? Regístrate aquí</a>
        </form>
        
    </div>

    <script src="js/script.js"></script>
</body>
</html>
